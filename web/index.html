<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Vault-Explorer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="navhistory">
        <button id="nav-back" title="Zurück (zuletzt geöffnetes Dokument)" disabled>⟵</button>
        <button id="nav-fwd" title="Vorwärts" disabled>⟶</button>
      </div>
      <input id="search" placeholder="Suche im Vault …" autocomplete="off" />
      <div id="results" class="hidden"></div>
      <div id="controls">
        <div id="mode-switch">
          <button id="mode-graph" class="active">Graph</button>
          <button id="mode-pie">Kuchen</button>
          <button id="mode-ring">System-Ring</button>
        </div>
        <button id="reload-data" title="Vault neu von der Festplatte einlesen — neue/gelöschte Notizen übernehmen (Server-Cache leeren + Seite neu laden)">🔄 Vault neu laden</button>
        <div id="graph-controls">
          <label class="ctl">Cluster-Ebene
            <select id="cluster-depth">
              <option value="1">Bereiche</option>
              <option value="2" selected>Domänen</option>
              <option value="3">Projekte</option>
            </select>
          </label>
          <label class="ctl"><input type="checkbox" id="toggle-orphans" /> Isolierte Notizen</label>
          <label class="ctl">Kompaktheit (<span id="compact-scope">alle</span>)
            <input type="range" id="compaction" min="25" max="120" value="62" />
          </label>
          <button id="relayout" title="Neu anordnen — ist ein Cluster markiert, nur dieses neu sortieren; sonst den ganzen Graph">↺ Neu anordnen</button>
          <button id="toggle-insights" title="Wartung: isolierte Notizen, Hubs, tote Links">🔧 Wartung</button>
        </div>
        <div id="pie-controls" style="display:none">
          <label class="ctl">Cluster-Ebene
            <select id="pie-depth">
              <option value="1" selected>Bereiche</option>
              <option value="2">Domänen</option>
              <option value="3">Projekte</option>
            </select>
          </label>
          <label class="ctl"><input type="checkbox" id="pie-orphans" checked /> Isolierte Notizen</label>
        </div>
      </div>
      <canvas id="hulls"></canvas>
      <div id="cy"></div>
      <canvas id="pie-guides" style="display:none"></canvas>
      <div id="pie" style="display:none"></div>
      <canvas id="ring-guides" style="display:none"></canvas>
      <div id="ring" style="display:none"></div>
      <canvas id="minimap" title="Übersicht — Klick schwenkt dorthin"></canvas>
      <aside id="insights" class="hidden"></aside>
      <aside id="inspector" class="hidden"></aside>
      <div id="inspector-resize" title="Breite ziehen"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
