name: CI

on:
  push:
  pull_request:

jobs:
  # Backend-Tests plattformübergreifend — deckt die Windows-Pfad-/Fixture-Fälle ab,
  # die früher nur lokal auf einem Windows-Rechner auffielen (open-loops 2026-07-15).
  tests:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (editable + dev extras)
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v

  # Frontend baut ohne TypeScript-Fehler (ein OS reicht — reiner TS/Vite-Build).
  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
